[colors]
draw_bold_text_with_bright_colors = false

[font]
builtin_box_drawing = true
size = 12.0

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Bold Italic"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[[keyboard.bindings]]
action = "Paste"
key = "F12"
mods = "Shift"

[[keyboard.bindings]]
chars = "\r"
key = "NumpadEnter"

[window]
opacity = 0.85

[window.padding]
x = 10
y = 5
